# .cnb.yml
main:
  push:
    - imports: https://cnb.cool/realme.top/KEYS/-/blob/main/env.chat.yml
      stages:
        - name: sync to github
          image: tencentcom/git-sync
          settings:
            target_url: https://github.com/heerheer/chat.realme.top.git
            auth_type: https
            username: heerheer
            password: ${GITHUB_ACCESS_TOKEN}